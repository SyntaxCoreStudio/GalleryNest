<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | GalleryNest</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body>
    <a href="/login.html" class="back-home">← Back to Login</a>

    <section class="auth-card">
      <div class="auth-badge">GalleryNest</div>
      <h1>Choose a new password</h1>
      <p>Enter your new password below to reset your account password.</p>

      <form id="reset-password-form" class="auth-form" novalidate>
        <input
          type="password"
          id="password"
          placeholder="New password"
          minlength="8"
          required
        />

        <input
          type="password"
          id="confirm-password"
          placeholder="Confirm new password"
          minlength="8"
          required
        />

        <button type="submit">Reset Password</button>
      </form>

      <p id="message"></p>

      <div class="auth-link">
        Remembered your password? <a href="/login.html">Log in</a>
      </div>
    </section>

    <script src="/js/reset-password.js"></script>
  </body>
</html>

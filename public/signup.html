<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account | GalleryNest</title>
    <link rel="stylesheet" href="/css/auth.css" />
  </head>
  <body>
    <a href="/" class="back-home">← Back to Home</a>

    <div class="auth-card">
      <span class="auth-badge">GalleryNest</span>
      <h1>Create your account</h1>
      <p>Start delivering elegant online galleries to your clients.</p>

      <form id="signup-form" class="auth-form">
        <input
          type="email"
          id="email"
          placeholder="Email address"
          required
          autocomplete="email"
        />
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
          minlength="8"
          autocomplete="new-password"
        />
        <button type="submit">Create Account</button>
      </form>

      <label class="checkbox-row">
        <input type="checkbox" id="terms" required />
        <span>
          I agree to the
          <a href="/terms.html" target="_blank">Terms of Use</a> and
          <a href="/privacy.html" target="_blank">Privacy Policy</a>
        </span>
      </label>

      <p id="message"></p>
      <p class="auth-link">
        Already have an account? <a href="/login.html">Log in</a>
      </p>
    </div>

    <footer class="site-footer">
      <p>
        &copy; 2026 GalleryNest. All rights reserved. | GalleryNest is a product
        of SyntaxCore Studio
      </p>
      <nav>
        <a href="/terms.html">Terms of Use</a>
        <a href="/privacy.html">Privacy Policy</a>
      </nav>
    </footer>

    <script src="/js/signup.js"></script>
  </body>
</html>
